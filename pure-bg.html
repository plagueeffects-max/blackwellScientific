  <body>
    <div id="root"></div>
    <style>
      /* Hide ALL text and UI elements, keep only the 3D Canvas */
      #root h1, #root h2, #root h3, #root h4, #root h5, #root h6, #root p, #root span, #root a, #root button, #root img, #root svg {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      /* Disable scrolling, ensure page stays fixed */
      html, body {
        overflow: hidden !important;
        height: 100vh !important;
        width: 100vw !important;
        touch-action: none !important;
      }
    </style>
    <script>
      // Prevent internal JS from paginating/scrolling to other slides
      window.addEventListener('wheel', (e) => e.stopImmediatePropagation(), { capture: true, passive: false });
      window.addEventListener('touchmove', (e) => e.stopImmediatePropagation(), { capture: true, passive: false });
      window.addEventListener('touchstart', (e) => e.stopImmediatePropagation(), { capture: true, passive: false });
      window.addEventListener('keydown', (e) => {
        if(['ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', 'Space'].includes(e.code)) {
          e.stopImmediatePropagation();
        }
      }, { capture: true, passive: false });

      // Automatically hide the "Drag To Explore" text once rendered by React
      const observer = new MutationObserver(() => {
        document.querySelectorAll('span, div, p').forEach(el => {
          if (el.textContent && (el.textContent.includes('Drag To Explore') || el.textContent.includes('Scroll'))) {
            if(el.children.length === 0) el.style.display = 'none';
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
