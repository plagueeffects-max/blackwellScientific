<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborate - Blackwell Scientific Solutions</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .collaborate-section {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 10%;
        }

        .dna-bases {
            position: absolute;
            left: 8%;
            top: 10%;
            width: 150px;
            height: 80%;
            pointer-events: none;
        }

        .base-tile {
            position: absolute;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite alternate;
        }

        .base-tile:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .base-tile:nth-child(2) { top: 18%; left: 40%; animation-delay: -1s; }
        .base-tile:nth-child(3) { top: 26%; left: 15%; animation-delay: -2s; }
        .base-tile:nth-child(4) { top: 34%; left: 50%; animation-delay: -3s; }
        .base-tile:nth-child(5) { top: 42%; left: 5%; animation-delay: -1.5s; }
        .base-tile:nth-child(6) { top: 50%; left: 35%; animation-delay: -4s; }
        .base-tile:nth-child(7) { top: 58%; left: 20%; animation-delay: -2.5s; }
        .base-tile:nth-child(8) { top: 66%; left: 45%; animation-delay: -0.5s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(3deg); }
        }

        .form-container {
            width: 500px;
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .header-wrapper {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            text-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .glass-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .glass-input, .glass-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 1.2rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .glass-input::placeholder, .glass-textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .glass-input:focus, .glass-textarea:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
        }

        .glass-textarea {
            height: 140px;
            resize: none;
            border-radius: 25px;
        }

        .button-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
            position: relative;
            right: -60px;
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.2), 0 10px 30px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.3), 0 10px 40px rgba(0, 0, 0, 0.9);
        }

        .footer-details {
            position: absolute;
            bottom: 12%;
            left: 10%;
            font-size: 0.8rem;
            color: #777;
            line-height: 1.8;
            pointer-events: auto;
        }

        .socials {
            margin-top: 1rem;
            display: flex;
            gap: 1.2rem;
            font-weight: bold;
        }

        .socials span {
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .socials span:hover {
            color: #ffffff;
        }

        .copyright {
            position: absolute;
            bottom: 3%;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #444;
            left: 0;
        }

        .star-graphic {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 80px;
            height: 80px;
            background: #333;
            clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="collaborate-section">
        <div id="canvas-container"></div>

        <div class="ui-layer">
            <div class="dna-bases">
                <div class="base-tile">T</div>
                <div class="base-tile">G</div>
                <div class="base-tile">A</div>
                <div class="base-tile">G</div>
                <div class="base-tile">T</div>
                <div class="base-tile">A</div>
                <div class="base-tile">G</div>
                <div class="base-tile">C</div>
            </div>

            <div class="form-container">
                <div class="header-wrapper">
                    <p class="subtitle">CONTACT US</p>
                    <h1 class="title">COLLABORATE.</h1>
                </div>

                <form class="glass-form" onsubmit="event.preventDefault(); console.log('Sent');">
                    <input type="text" placeholder="Name" class="glass-input" required />
                    <input type="email" placeholder="Email" class="glass-input" required />
                    <textarea placeholder="Message" class="glass-textarea" required></textarea>
                    
                    <div class="button-wrapper">
                        <button type="submit" class="glass-button">SEND</button>
                    </div>
                </form>
            </div>

            <div class="footer-details">
                <p>Contact details</p>
                <p>+91 000 000 0000</p>
                <p>Srinagar, Jammu & Kashmir</p>
                <p>www.blackwellscientific.com</p>
                <div class="socials">
                    <span>f</span> <span>t</span> <span>ig</span>
                </div>
            </div>
            
            <div class="copyright">
                <p>© 2026 Blackwell Scientific Solutions. All rights reserved.</p>
            </div>

            <div class="star-graphic"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        const container = document.getElementById('canvas-container');
        let scene, camera, renderer, dnaGroup;
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 18);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // Premium Dark Glass Material
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x000000,       
                metalness: 0.8,        
                roughness: 0.1,        
                transmission: 0.95,     
                ior: 1.6,              
                thickness: 4.0,        
                clearcoat: 1.0,        
                clearcoatRoughness: 0.1,
                side: THREE.DoubleSide
            });

            // --- PROCEDURAL DNA GENERATOR ---
            dnaGroup = new THREE.Group();

            // Custom mathematical curve for a spiraling helix
            class HelixCurve extends THREE.Curve {
                constructor(offsetPhase) {
                    super();
                    this.offsetPhase = offsetPhase;
                }
                getPoint(t, optionalTarget = new THREE.Vector3()) {
                    const length = 14;     // How long the DNA is
                    const numTurns = 2.5;  // How many times it twists
                    const radius = 1.5;    // How wide the helix is
                    
                    const x = (t - 0.5) * length;
                    const angle = t * Math.PI * 2 * numTurns + this.offsetPhase;
                    
                    // Taper the ends to make it look organic and soft
                    const taper = Math.sin(t * Math.PI); 
                    const currentRadius = radius * (0.4 + 0.6 * taper);

                    const y = Math.cos(angle) * currentRadius;
                    const z = Math.sin(angle) * currentRadius;
                    
                    return optionalTarget.set(x, y, z);
                }
            }

            // Create the two twisting backbone strands
            const path1 = new HelixCurve(0);
            const path2 = new HelixCurve(Math.PI); // Offset by 180 degrees
            
            const tubeGeom1 = new THREE.TubeGeometry(path1, 150, 0.35, 16, false);
            const tubeGeom2 = new THREE.TubeGeometry(path2, 150, 0.35, 16, false);
            
            const strand1 = new THREE.Mesh(tubeGeom1, glassMaterial);
            const strand2 = new THREE.Mesh(tubeGeom2, glassMaterial);
            dnaGroup.add(strand1, strand2);

            // Create the connecting "rungs" between the strands
            const numRungs = 20;
            for (let i = 1; i < numRungs; i++) {
                const t = i / numRungs;
                const p1 = path1.getPoint(t);
                const p2 = path2.getPoint(t);
                
                const distance = p1.distanceTo(p2);
                const rungGeom = new THREE.CylinderGeometry(0.2, 0.2, distance, 12);
                const rungMesh = new THREE.Mesh(rungGeom, glassMaterial);
                
                // Position rung precisely halfway between the two paths
                const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
                rungMesh.position.copy(midPoint);
                
                // Angle the rung to connect the dots
                rungMesh.lookAt(p2);
                rungMesh.rotateX(Math.PI / 2);
                
                dnaGroup.add(rungMesh);
            }

            // Position and angle the entire DNA strand towards the form button
            dnaGroup.position.set(-2.5, -2, 0);
            dnaGroup.rotation.z = Math.PI / 5; // Angle it down/right
            scene.add(dnaGroup);

            // --- LIGHTING ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const frontLight = new THREE.DirectionalLight(0xffffff, 2);
            frontLight.position.set(5, 5, 10);
            scene.add(frontLight);

            // Deep Red backlight pushed behind the DNA to shine through the glass
            const redBackLight = new THREE.PointLight(0x8b0000, 600, 50);
            redBackLight.position.set(-4, -4, -6); 
            scene.add(redBackLight);

            // Cool rim light
            const coolRimLight = new THREE.PointLight(0x445566, 400, 50);
            coolRimLight.position.set(5, 0, -5);
            scene.add(coolRimLight);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Give the DNA a slow, organic float and spin
            if (dnaGroup) {
                dnaGroup.rotation.x = time * 0.1;
                dnaGroup.position.y = -2 + Math.sin(time * 0.5) * 0.2;
            }

            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
